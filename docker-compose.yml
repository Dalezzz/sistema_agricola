version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sistema-agricola-db
    environment:
      POSTGRES_USER: ${DB_USER:-agricola}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-sistema_agricola}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sistema-agricola

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sistema-agricola-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-agricola}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-sistema_agricola}
      CORS_ORIGIN: http://localhost:3000
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
    volumes:
      - ./backend/src:/app/src
    networks:
      - sistema-agricola
    command: npm run start:prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sistema-agricola-frontend
    environment:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://backend:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - sistema-agricola
    command: npm run dev

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: sistema-agricola-ml
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    networks:
      - sistema-agricola
    volumes:
      - ./ml-service:/app

  n8n:
    image: n8nio/n8n:latest
    container_name: sistema-agricola-n8n
    ports:
      - "5678:5678"
    environment:
      GENERIC_TIMEZONE: America/Argentina/Buenos_Aires
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: ${N8N_PASSWORD:-password}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n-workflows:/workflows
    networks:
      - sistema-agricola

  redis:
    image: redis:7-alpine
    container_name: sistema-agricola-cache
    ports:
      - "6379:6379"
    networks:
      - sistema-agricola

volumes:
  postgres_data:
  n8n_data:

networks:
  sistema-agricola:
    driver: bridge
